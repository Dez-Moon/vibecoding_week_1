services:
  - type: web
    name: kanban-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: uv sync
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: kanban-studio
          property: connectionString
